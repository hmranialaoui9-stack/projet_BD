<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomBook - Réservation de salles</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <div class="brand">
            <h1>RoomBook</h1>
            <p>Gestion de réservation des salles de réunion</p>
        </div>
        <div class="meta">
            <p>Base de données : RoomBook.sql</p>
        </div>
    </header>
    <main>
        <section class="section section-filters">
            <div class="card">
                <h2>Filtrer le planning</h2>
                <div class="filter-row">
                    <label for="filter-date">Semaine de</label>
                    <input type="date" id="filter-date">
                </div>
                <div class="filter-row">
                    <label for="filter-room">Salle</label>
                    <select id="filter-room">
                        <option value="all">Toutes les salles</option>
                    </select>
                </div>
                <button id="refresh-schedule" class="primary">Actualiser</button>
            </div>
        </section>
        <section class="section section-schedule">
            <div class="card">
                <div class="card-title">
                    <h2>Planning hebdomadaire</h2>
                    <div id="week-label"></div>
                </div>
                <div class="table-wrapper">
                    <table id="schedule-table">
                        <thead></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </section>
        <section class="section section-form">
            <div class="card split-card">
                <div>
                    <h2>Nouvelle réservation</h2>
                    <form id="booking-form">
                        <label for="room">Salle</label>
                        <select id="room" required></select>
                        <label for="employee">Employé</label>
                        <select id="employee" required></select>
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                        <div class="time-row">
                            <div>
                                <label for="start">Heure début</label>
                                <input type="time" id="start" required>
                            </div>
                            <div>
                                <label for="end">Heure fin</label>
                                <input type="time" id="end" required>
                            </div>
                        </div>
                        <label for="title">Titre</label>
                        <input type="text" id="title" placeholder="Objet de la réunion" required>
                        <label for="status">Statut</label>
                        <select id="status">
                            <option value="en_attente">En attente</option>
                            <option value="confirmee">Confirmée</option>
                            <option value="annulee">Annulée</option>
                        </select>
                        <button type="submit" class="primary">Réserver</button>
                        <p id="form-message" class="message"></p>
                    </form>
                </div>
                <div class="current-reservations">
                    <h2>Réservations actuelles</h2>
                    <div class="table-wrapper">
                        <table id="reservations-table">
                            <thead>
                                <tr>
                                    <th>Salle</th>
                                    <th>Employé</th>
                                    <th>Date</th>
                                    <th>Début</th>
                                    <th>Fin</th>
                                    <th>Statut</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <p>Projet RoomBook — Vérification des conflits de réservation en JavaScript.</p>
    </footer>
    <script src="index.js"></script>
</body>
</html>
